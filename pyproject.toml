[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "jellyfin-music-replay"
version = "0.1.0"
description = "Generate music replay playlists for Jellyfin, based on the database generated by the Playback Reporting plugin."
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "python-dotenv>=1.2.2",
    "requests>=2.34.2",
]

[project.scripts]
jellyfin-music-replay = "jellyfin_music_replay.main:main"
